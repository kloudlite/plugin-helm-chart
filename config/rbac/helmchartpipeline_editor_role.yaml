# permissions for end users to edit helmchartpipelines.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: plugin-helm-chart
    app.kubernetes.io/managed-by: kustomize
  name: helmchartpipeline-editor-role
rules:
- apiGroups:
  - plugin-helm-chart.kloudlite.github.com
  resources:
  - helmchartpipelines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - plugin-helm-chart.kloudlite.github.com
  resources:
  - helmchartpipelines/status
  verbs:
  - get
